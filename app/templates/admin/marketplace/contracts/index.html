{% extends "admin/layout.html" %}

{% block content %}

<div class="space-y-6" x-data="{
contracts:[
{
id:1,
title:'عقد شراء معدات تعدين',
party:'شركة التعدين المتحدة',
value:'120,000 $',
status:'نشط'
},
{
id:2,
title:'عقد شراكة موقع تعدين',
party:'مؤسسة الذهب السودانية',
value:'حسب الاتفاق',
status:'قيد المراجعة'
}
]
}">

<h2 class="text-xl font-bold text-white border-b border-gray-700 pb-3">
📄 العقود التجارية
</h2>

<div class="grid gap-4">

<template x-for="item in contracts" :key="item.id">

<div class="bg-gray-800 border border-gray-700 rounded-xl p-4 text-white">

<h3 class="font-bold text-amber-400" x-text="item.title"></h3>

<div class="text-sm text-gray-300 mt-2">
<p>الطرف: <span x-text="item.party"></span></p>
<p>القيمة: <span x-text="item.value"></span></p>
</div>

<span class="inline-block mt-3 bg-green-600 px-3 py-1 rounded text-xs"
x-text="item.status"></span>

</div>

</template>

</div>

</div>

{% endblock %}
