{% extends "admin/layout.html" %}

{% block content %}

<div class="space-y-6" x-data="{
    negotiations: [
        {
            id: 1,
            title: 'تفاوض شراء ماكينة طحن ذهب',
            buyer: 'شركة التعدين المتحدة',
            seller: 'مؤسسة الذهب العالمية',
            offer: '45,000 $',
            status: 'جاري التفاوض'
        },
        {
            id: 2,
            title: 'تفاوض حول معدات حفر',
            buyer: 'موقع تعدين نهر النيل',
            seller: 'شركة المعدات السودانية',
            offer: 'حسب الاتفاق',
            status: 'بانتظار الرد'
        }
    ]
}">

<h2 class="text-xl font-bold text-white border-b border-gray-700 pb-3">
🤝 المفاوضات التجارية
</h2>

<div class="grid gap-4">

<template x-for="item in negotiations" :key="item.id">

<div class="bg-gray-800 border border-gray-700 rounded-xl p-4 text-white">

<h3 class="font-bold text-amber-400" x-text="item.title"></h3>

<div class="text-sm text-gray-300 mt-2">
<p>المشتري: <span x-text="item.buyer"></span></p>
<p>البائع: <span x-text="item.seller"></span></p>
<p>العرض: <span x-text="item.offer"></span></p>
</div>

<span class="inline-block mt-3 bg-blue-600 px-3 py-1 rounded text-xs"
x-text="item.status"></span>

</div>

</template>

</div>

</div>

{% endblock %}
