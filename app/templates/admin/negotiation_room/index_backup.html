{% extends "admin/layout.html" %}

{% block title %}
غرفة التفاوض
{% endblock %}


{% block content %}

<h1 style="font-size:28px;margin-bottom:20px">
🤝 تفاصيل غرفة التفاوض
</h1>


<div class="cards">

<div class="card">
<h3>رقم الغرفة</h3>
<h1 id="room_id">-</h1>
</div>

<div class="card">
<h3>الأصل</h3>
<h1 id="asset">-</h1>
</div>

<div class="card">
<h3>الحالة</h3>
<h1 id="status">-</h1>
</div>

</div>


<div class="placeholder-card">

<h2>👥 الأطراف</h2>

<p id="parties"></p>

</div>



<div class="placeholder-card">

<h2>💬 الرسائل</h2>

<div id="messages">
</div>

</div>



<div class="placeholder-card">

<h2>💰 العروض</h2>

<table width="100%">

<thead>
<tr>
<th>القيمة</th>
<th>العملة</th>
<th>الحالة</th>
</tr>
</thead>

<tbody id="offers">
</tbody>

</table>

</div>



<script>

async function loadRoom(){

let id = location.pathname.split("/").pop();

let r = await fetch(
"/admin/operations/negotiation-room/"+id
);

let d = await r.json();


document.getElementById("room_id").innerText=d.room.id;

document.getElementById("asset").innerText=d.room.asset_id;

document.getElementById("status").innerText=d.room.status;


document.getElementById("parties").innerHTML =
`
المشتري: ${d.room.buyer_id}
<br>
البائع: ${d.room.seller_id}
`;


document.getElementById("messages").innerHTML =
d.messages.length ?
d.messages.map(
m=>`
<div class="card">
<b>${m.sender_id}</b>
<p>${m.message}</p>
</div>
`
).join("")
:
"لا توجد رسائل";


document.getElementById("offers").innerHTML =
d.offers.map(
o=>`
<tr>
<td>${o.amount}</td>
<td>${o.currency}</td>
<td>${o.status}</td>
</tr>
`
).join("");

}


loadRoom();

</script>


{% endblock %}
