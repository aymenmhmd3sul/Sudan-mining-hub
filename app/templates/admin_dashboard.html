<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة المشرف - محرك الأتمتة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { height: 100%; overflow: hidden; }
        .bankak-btn {
            background: linear-gradient(135deg, #e11d48 0%, #be123c 100%);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.4), 0 4px 6px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }
        .bankak-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 antialiased flex flex-col justify-between h-full select-none">

    <header class="bg-gradient-to-r from-red-700 via-red-800 to-red-900 text-white px-4 pt-5 pb-4 shadow-md w-full max-w-md mx-auto flex-shrink-0 flex justify-between items-center rounded-b-[1.5rem]">
        <a href="/" class="text-white hover:text-red-200 text-2xl p-1"><i class="fas fa-power-off"></i></a>
        
        <div class="flex items-center space-x-reverse space-x-2 bg-black/20 px-3 py-1.5 rounded-full border border-white/10">
            <span class="text-[10px] font-black tracking-wide" id="autoStatusText">القيادة الآلية: نشطة</span>
            <input type="checkbox" id="autoToggle" checked onclick="toggleAutomationSystem()" class="w-4 h-4 accent-amber-500 cursor-pointer">
        </div>
        
        <button onclick="alert('النظام يعمل ومستقر')" class="relative p-1 text-2xl"><i class="fas fa-robot text-amber-400"></i></button>
    </header>

    <div class="w-full max-w-md mx-auto px-6 pt-5 pb-1 flex-shrink-0">
        <h2 class="text-xl font-bold text-slate-800">مساء الخير، <span class="text-red-700 font-black">Ayman Mohamed</span></h2>
        <p class="text-[11px] text-slate-400 font-semibold mt-0.5">لوحة اختبار التحكم والأتمتة الذاتية</p>
    </div>

    <main class="max-w-md mx-auto px-6 flex-grow w-full flex flex-col justify-center overflow-hidden">
        <div class="grid grid-cols-3 gap-x-4 gap-y-6 text-center">
            
            <div class="flex flex-col items-center">
                <button onclick="triggerSmartSimulation()" class="bankak-btn w-20 h-20 rounded-2xl flex items-center justify-center text-white text-3xl ring-4 ring-amber-500/40">
                    <i class="fas fa-vial-circle-check"></i>
                </button>
                <span class="text-xs font-black text-amber-600 mt-2">تجربة دفع تاجر</span>
            </div>
            
            <div class="flex flex-col items-center"><button class="bankak-btn w-20 h-20 rounded-2xl flex items-center justify-center text-white text-3xl"><i class="fas fa-users-cog"></i></button><span class="text-xs font-bold text-slate-700 mt-2">التجار</span></div>
            <div class="flex flex-col items-center"><button class="bankak-btn w-20 h-20 rounded-2xl flex items-center justify-center text-white text-3xl"><i class="fas fa-boxes-stacked"></i></button><span class="text-xs font-bold text-slate-700 mt-2">الأصول</span></div>
            <div class="flex flex-col items-center"><button class="bankak-btn w-20 h-20 rounded-2xl flex items-center justify-center text-white text-3xl"><i class="fas fa-wallet"></i></button><span class="text-xs font-bold text-slate-700 mt-2">الإدارة المالية</span></div>
            <div class="flex flex-col items-center"><button class="bankak-btn w-20 h-20 rounded-2xl flex items-center justify-center text-white text-3xl"><i class="fas fa-bullhorn"></i></button><span class="text-xs font-bold text-slate-700 mt-2">التسويق والمميز</span></div>
            <div class="flex flex-col items-center"><button class="bankak-btn w-20 h-20 rounded-2xl flex items-center justify-center text-white text-3xl"><i class="fas fa-file-shield"></i></button><span class="text-xs font-bold text-slate-700 mt-2">التوثيق</span></div>
            <div class="flex flex-col items-center"><button class="bankak-btn w-20 h-20 rounded-2xl flex items-center justify-center text-white text-3xl"><i class="fas fa-chart-line"></i></button><span class="text-xs font-bold text-slate-700 mt-2">التقارير</span></div>
            <div class="flex flex-col items-center"><button class="bankak-btn w-20 h-20 rounded-2xl flex items-center justify-center text-white text-3xl"><i class="fas fa-sliders"></i></button><span class="text-xs font-bold text-slate-700 mt-2">الضبط العام</span></div>
            <div class="flex flex-col items-center opacity-25"><div class="w-20 h-20 rounded-2xl border-2 border-dashed border-slate-400 flex items-center justify-center text-slate-400 text-2xl"><i class="fas fa-plus"></i></div><span class="text-[10px] font-bold text-slate-400 mt-2">قريباً</span></div>
        </div>
    </main>

    <footer class="py-4 text-center border-t border-slate-200 bg-white w-full max-w-md mx-auto flex-shrink-0">
        <p class="text-[10px] font-bold text-slate-400">نظام محاكاة الأتمتة والذكاء الذاتي © 2026</p>
    </footer>

    <script>
        // إشارة التبديل بين الآلي واليدوي للسيرفر
        async function toggleAutomationSystem() {
            const isChecked = document.getElementById('autoToggle').checked;
            const textStatus = document.getElementById('autoStatusText');
            textStatus.textContent = isChecked ? "القيادة الآلية: نشطة" : "القيادة الآلية: معطلة";
            
            let formData = new FormData();
            formData.append('enabled', isChecked);
            await fetch('/admin/toggle-automation', { method: 'POST', body: formData });
        }

        // دالة ذكية تولد أرقام عمليات مختلفة لمنع كبسولة التكرار الدائم
        function triggerSmartSimulation() {
            // توليد رقم عشوائي فريد لكل ضغطة محاكاة (مثال: BKNK-4829)
            const randomTxn = "BKNK-" + Math.floor(1000 + Math.random() * 9000);
            simulateTraderAction(35000, randomTxn);
        }

        async function simulateTraderAction(amount, txnNum) {
            let formData = new FormData();
            formData.append('amount', amount);
            formData.append('transaction_number', txnNum);
            
            let response = await fetch('/api/trader/submit-payment', { method: 'POST', body: formData });
            let result = await response.json();
            
            if (result.status === "REJECTED") {
                alert(`[استجابة النظام الآلي]:\nحالة العملية: REJECTED ❌\nالرسالة: ${result.reason}`);
            } else if (result.status === "AUTO_APPROVED") {
                alert(`[استجابة النظام الآلي]:\nحالة العملية: AUTO_APPROVED ✅\nالرسالة: ${result.message}\nرقم العملية التجريبي: ${txnNum}`);
            } else {
                alert(`[استجابة النظام الآلي]:\nحالة العملية: PENDING ⏳\nالرسالة: ${result.message}`);
            }
        }
    </script>
</body>
</html>
