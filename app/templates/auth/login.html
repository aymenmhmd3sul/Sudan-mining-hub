<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - سودان مايننج هاب</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0b132b;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background-color: #1c2541;
            border: 1px solid #ffc107;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 100%;
        }
        .form-control {
            background-color: #0b132b;
            border: 1px solid #3a506b;
            color: #fff;
        }
        .form-control:focus {
            background-color: #0b132b;
            border-color: #ffc107;
            color: #fff;
            box-shadow: none;
        }
        .btn-warning {
            background-color: #ffc107;
            border: none;
            color: #0b132b;
            font-weight: bold;
        }
        .btn-warning:hover {
            background-color: #e0a800;
            color: #0b132b;
        }
    </style>
</head>
<body>

<div class="login-card p-4">
    <div class="text-center mb-4">
        <div class="mb-2">
            <i class="fa-solid fa-gem text-warning fa-3x"></i>
        </div>
        <h4 class="fw-bold text-white">سودان مايننج هاب</h4>
        <p class="text-muted small mb-0">مركز قيادة المنصة والتداولات</p>
    </div>

    <form action="/login" method="POST">
        <div class="mb-3">
            <label class="form-label text-light small">البريد الإلكتروني</label>
            <div class="input-group">
                <span class="input-group-text bg-dark border-secondary text-warning"><i class="fa-solid fa-envelope"></i></span>
                <input type="email" name="username" class="form-control" value="aymen.mhmd3@gmail.com" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label text-light small">كلمة المرور</label>
            <div class="input-group">
                <span class="input-group-text bg-dark border-secondary text-warning"><i class="fa-solid fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-warning w-100 py-2 mb-3">تسجيل الدخول الآن</button>
    </form>

    <div class="text-center pt-2 border-top border-secondary">
        <a href="/" class="text-muted text-decoration-none small"><i class="fa-solid fa-arrow-right me-1"></i> العودة للرئيسية</a>
    </div>
</div>

</body>
</html>
