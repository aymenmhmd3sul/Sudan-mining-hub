<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السودان للتعدين</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', sans-serif; background: #0f172a; color: #f1f5f9; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .header h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-price { background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); padding: 12px 24px; border-radius: 12px; font-size: 1.3rem; font-weight: 600; color: #fbbf24; }
        .gold-price span { font-size: 0.8rem; color: #94a3b8; font-weight: 400; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 24px 20px; text-align: center; transition: transform 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; }
        .card:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
        .card-icon { font-size: 2.5rem; margin-bottom: 8px; display: block; }
        .card-number { font-size: 2rem; font-weight: 700; color: #fbbf24; margin: 6px 0; }
        .card-number.green { color: #22c55e; }
        .card-number.purple { color: #a855f7; }
        .card-label { color: #94a3b8; font-size: 0.9rem; }
        .btn { padding: 10px 24px; background: #22c55e; border: none; color: white; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(34, 197, 94, 0.3); }
        .btn-blue { background: #3b82f6; }
        .btn-blue:hover { box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3); }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); text-align: center; color: #64748b; font-size: 0.9rem; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #22c55e; padding: 12px 24px; border-radius: 12px; display: none; z-index: 999; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 600px; width: 90%; border: 1px solid rgba(255,255,255,0.1); max-height: 80vh; overflow-y: auto; }
        .modal-content h2 { color: #fbbf24; margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #0f172a; color: white; font-size: 1rem; margin-bottom: 15px; }
        .modal-content .btn-submit { width: 100%; padding: 12px; background: linear-gradient(135deg, #fbbf24, #f59e0b); border: none; color: #0f172a; font-weight: 700; border-radius: 10px; font-size: 1rem; cursor: pointer; }
        .modal-content .btn-close { background: #ef4444; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; float: left; }
        .list-item { background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-right: 4px solid #fbbf24; }
        .list-item strong { color: #fbbf24; }
        .list-item small { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛏️ منصة السودان للتعدين</h1>
            <div class="gold-price" id="goldPrice">💰 USD 0.00 <span>| PAXG</span></div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <button class="btn" id="loginBtn">🔑 تسجيل الدخول</button>
            <button class="btn btn-blue" id="registerBtn">📝 تسجيل جديد</button>
        </div>

        <div class="grid">
            <div class="card" id="ordersCard">
                <span class="card-icon">📦</span>
                <div class="card-number" id="orders">0</div>
                <div class="card-label">الطلبات المفتوحة</div>
            </div>
            <div class="card" id="offersCard">
                <span class="card-icon">🤝</span>
                <div class="card-number green" id="offers">0</div>
                <div class="card-label">العروض المقدمة</div>
            </div>
            <div class="card" id="chatsCard">
                <span class="card-icon">💬</span>
                <div class="card-number purple" id="chats">0</div>
                <div class="card-label">المحادثات النشطة</div>
            </div>
        </div>

        <div style="background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 30px; text-align: center; border: 1px dashed rgba(255,255,255,0.1);">
            <h3 style="color: #94a3b8; font-size: 0.9rem;">📢 مساحة للإعلانات</h3>
            <p style="color: #64748b;">سيتم عرض الإعلانات هنا</p>
        </div>

        <div style="background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 30px; border: 1px dashed rgba(255,255,255,0.1);">
            <h3 style="color: #fbbf24; margin-bottom: 15px;">🏅 أسعار الذهب المحلية</h3>
            <div id="goldPrices" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
                <p style="color: #94a3b8;">جاري التحميل...</p>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 منصة السودان للتعدين — نظام مباشر 🚀</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- نافذة تسجيل الدخول -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <button class="btn-close" onclick="closeModal('loginModal')">✕</button>
            <h2>🔑 تسجيل الدخول</h2>
            <form onsubmit="login(event)">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
                <input type="password" id="loginPassword" placeholder="كلمة المرور" required>
                <button type="submit" class="btn-submit">دخول</button>
            </form>
        </div>
    </div>

    <!-- نافذة تسجيل جديد -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <button class="btn-close" onclick="closeModal('registerModal')">✕</button>
            <h2>📝 تسجيل جديد</h2>
            <form onsubmit="register(event)">
                <input type="text" id="regName" placeholder="الاسم الكامل" required>
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني" required>
                <input type="text" id="regPhone" placeholder="رقم الهاتف" required>
                <select id="regRole" required>
                    <option value="buyer">مشتري</option>
                    <option value="seller">تاجر</option>
                </select>
                <input type="password" id="regPassword" placeholder="كلمة المرور" required>
                <button type="submit" class="btn-submit">تسجيل</button>
            </form>
            <div id="registerMessage" style="margin-top:10px;text-align:center;"></div>
        </div>
    </div>

    <!-- نافذة عرض القوائم -->
    <div class="modal" id="listModal">
        <div class="modal-content">
            <button class="btn-close" onclick="closeModal('listModal')">✕</button>
            <h2 id="listModalTitle">قائمة</h2>
            <div id="listModalBody"></div>
        </div>
    </div>

    <script>
        // دوال النوافذ
        function openModal(type) {
            var modalId = { 'login': 'loginModal', 'register': 'registerModal' }[type];
            if (modalId) document.getElementById(modalId).classList.add('active');
        }
        function closeModal(id) { 
            document.getElementById(id).classList.remove('active'); 
        }

        // عرض القوائم في نافذة منبثقة
        function showList(title, itemsHtml) {
            document.getElementById('listModalTitle').textContent = title;
            document.getElementById('listModalBody').innerHTML = itemsHtml;
            document.getElementById('listModal').classList.add('active');
        }

        // ربط الأزرار والبطاقات
        document.addEventListener('DOMContentLoaded', function() {
            // أزرار تسجيل الدخول والتسجيل
            document.getElementById('loginBtn').addEventListener('click', function() { openModal('login'); });
            document.getElementById('registerBtn').addEventListener('click', function() { openModal('register'); });

            // بطاقة الطلبات
            document.getElementById('ordersCard').addEventListener('click', function() {
                fetch('/api/opportunities/list')
                    .then(r => r.json())
                    .then(data => {
                        if (data.opportunities && data.opportunities.length > 0) {
                            let html = data.opportunities.map(o => 
                                `<div class="list-item"><strong>${o.specs}</strong> - ${o.budget} ج.س (${o.city})<br><small>${o.status} | ${o.created_at}</small></div>`
                            ).join('');
                            showList('📦 الطلبات المفتوحة', html);
                        } else {
                            showList('📦 الطلبات المفتوحة', '<p style="color:#94a3b8;">لا توجد طلبات حالياً</p>');
                        }
                    })
                    .catch(() => showList('📦 الطلبات المفتوحة', '<p style="color:#ef4444;">فشل تحميل الطلبات</p>'));
            });

            // بطاقة العروض
            document.getElementById('offersCard').addEventListener('click', function() {
                fetch('/api/opportunities/all-offers')
                    .then(r => r.json())
                    .then(data => {
                        if (data.offers && data.offers.length > 0) {
                            let html = data.offers.map(o => 
                                `<div class="list-item"><strong>${o.specs}</strong> - ${o.price} ج.س<br><small>حالة: ${o.status} | التسليم: ${o.delivery_time}</small></div>`
                            ).join('');
                            showList('🤝 العروض المقدمة', html);
                        } else {
                            showList('🤝 العروض المقدمة', '<p style="color:#94a3b8;">لا توجد عروض حالياً</p>');
                        }
                    })
                    .catch(() => showList('🤝 العروض المقدمة', '<p style="color:#ef4444;">فشل تحميل العروض</p>'));
            });

            // بطاقة المحادثات (تتطلب معرف مستخدم، نأخذه من التخزين المحلي)
            document.getElementById('chatsCard').addEventListener('click', function() {
                var user = localStorage.getItem('user');
                if (!user) {
                    showList('💬 المحادثات النشطة', '<p style="color:#fbbf24;">يرجى تسجيل الدخول أولاً لعرض المحادثات</p>');
                    return;
                }
                user = JSON.parse(user);
                fetch('/api/chat/list/' + user.id)
                    .then(r => r.json())
                    .then(data => {
                        if (data.chats && data.chats.length > 0) {
                            let html = data.chats.map(c => 
                                `<div class="list-item"><strong>الفرصة #${c.opportunity_id}</strong><br><small>الرسائل: ${c.messages.length} | الحالة: ${c.status}</small></div>`
                            ).join('');
                            showList('💬 المحادثات النشطة', html);
                        } else {
                            showList('💬 المحادثات النشطة', '<p style="color:#94a3b8;">لا توجد محادثات حالياً</p>');
                        }
                    })
                    .catch(() => showList('💬 المحادثات النشطة', '<p style="color:#ef4444;">فشل تحميل المحادثات</p>'));
            });

            // تحميل البيانات الأولية
            loadGlobalGold();
            loadGoldPrices();
            loadStats();
        });

        // باقي الدوال (toast, login, register, load...)
        function showToast(msg, err) {
            var t = document.getElementById('toast');
            t.textContent = msg; t.style.display = 'block';
            t.style.borderColor = err ? '#ef4444' : '#22c55e';
            setTimeout(function() { t.style.display = 'none'; }, 4000);
        }

        async function login(e) {
            e.preventDefault();
            var email = document.getElementById('loginEmail').value;
            var password = document.getElementById('loginPassword').value;
            try {
                var r = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                var d = await r.json();
                if (d.status === 'success') {
                    showToast('✅ مرحباً ' + d.user.name, false);
                    closeModal('loginModal');
                    localStorage.setItem('user', JSON.stringify(d.user));
                    document.querySelector('.header h1').innerHTML = '⛏️ مرحباً ' + d.user.name;
                } else { showToast('❌ ' + d.detail, true); }
            } catch (err) { showToast('❌ خطأ في الاتصال', true); }
        }

        async function register(e) {
            e.preventDefault();
            var name = document.getElementById('regName').value;
            var email = document.getElementById('regEmail').value;
            var phone = document.getElementById('regPhone').value;
            var role = document.getElementById('regRole').value;
            var password = document.getElementById('regPassword').value;
            try {
                var r = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, role, password })
                });
                var d = await r.json();
                if (d.status === 'success') {
                    showToast('✅ تم التسجيل بنجاح!', false);
                    closeModal('registerModal');
                    document.getElementById('registerMessage').textContent = '';
                } else {
                    document.getElementById('registerMessage').textContent = '❌ ' + d.detail;
                    document.getElementById('registerMessage').style.color = '#ef4444';
                }
            } catch (err) { showToast('❌ خطأ في الاتصال', true); }
        }

        async function loadGoldPrices() {
            try {
                var r = await fetch('/api/admin/gold-prices');
                var d = await r.json();
                var c = document.getElementById('goldPrices');
                if (d.prices && d.prices.length > 0) {
                    c.innerHTML = d.prices.map(p => '<div style="background:#0f172a;padding:10px;border-radius:10px;"><strong>' + p.city + '</strong><div>🟡 ' + (p.price_gram||0) + ' ج.س/جم</div></div>').join('');
                } else { c.innerHTML = '<p style="color:#94a3b8;">لا توجد أسعار</p>'; }
            } catch (err) { document.getElementById('goldPrices').innerHTML = '<p style="color:#ef4444;">فشل التحميل</p>'; }
        }

        async function loadStats() {
            try {
                var r = await fetch('/api/opportunities/list');
                var d = await r.json();
                document.getElementById('orders').textContent = d.opportunities ? d.opportunities.length : 0;
                
                var r2 = await fetch('/api/opportunities/all-offers');
                var d2 = await r2.json();
                document.getElementById('offers').textContent = d2.offers ? d2.offers.length : 0;
                
                var user = localStorage.getItem('user');
                if (user) {
                    user = JSON.parse(user);
                    var r3 = await fetch('/api/chat/list/' + user.id);
                    var d3 = await r3.json();
                    document.getElementById('chats').textContent = d3.chats ? d3.chats.length : 0;
                }
            } catch (err) { console.error(err); }
        }

        async function loadGlobalGold() {
            try {
                var r = await fetch('/api/gold');
                var d = await r.json();
                if (d.gold !== undefined) {
                    document.getElementById('goldPrice').innerHTML = '💰 USD ' + d.gold.toFixed(2) + ' <span>| PAXG</span>';
                }
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
