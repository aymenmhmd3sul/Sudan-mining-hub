<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تعدين السودان - بوابة الدخول المركزية</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .gateway-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #1e293b; font-size: 24px; margin-bottom: 10px; }
        p { color: #64748b; font-size: 14px; margin-bottom: 25px; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-primary { background-color: #2563eb; color: white; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .btn-outline { background-color: transparent; border: 2px solid #cbd5e1; color: #475569; }
        .btn-outline:hover { background-color: #f1f5f9; }
    </style>
</head>
<body>

<div class="gateway-container">
    <h1>منصة تعدين السودان</h1>
    <p>مرحباً بك في البوابة المركزية الآمنة للمنصة. يرجى اختيار وجهتك الحالية لبدء العمل التشغيلي:</p>
    
    <a href="/explore" class="btn btn-primary">الدخول إلى لوحة التحكم واستكشاف السوق</a>
    <a href="#" onclick="clearSession()" class="btn btn-outline">تصفير الجلسة الحالية (Clear Cache)</a>
</div>

<script>
    function clearSession() {
        localStorage.clear();
        alert('تم تصفير بيانات الجلسة المحلية بنجاح!');
        window.location.reload();
    }
</script>

</body>
</html>
