<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 380px;
      padding: 30px;
    }

    .logo {
      text-align: center;
      font-size: 34px;
      margin-bottom: 10px;
    }

    .title {
      text-align: center;
      font-size: 20px;
      margin-bottom: 25px;
      color: #cbd5e1;
    }

    .card {
      background: #111a2e;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #24324d;
      background: #0b1220;
      color: white;
      outline: none;
    }

    input:focus {
      border-color: #3b82f6;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #94a3b8;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .links {
      text-align: center;
      margin-top: 12px;
      font-size: 13px;
      color: #94a3b8;
    }

    .links a {
      color: #60a5fa;
      text-decoration: none;
    }

    .social {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
      font-size: 18px;
      color: #94a3b8;
    }

    .social span {
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">⛏️</div>
  <div class="title">Mining Hub Login</div>

  <div class="card">

    <form method="POST" action="/login">

      <input type="text" name="identifier" placeholder="Email or Phone" required>

      <div class="password-wrapper">
        <input type="password" name="password" id="password" placeholder="Password" required>
        <span class="toggle" onclick="togglePassword()">👁</span>
      </div>

      <button type="submit">Login</button>

    </form>

    <div class="links">
      New here? <a href="/register">Create account</a>
    </div>

    <div class="social">
      <span>🌐</span>
      <span>🐦</span>
      <span>📘</span>
      <span>📱</span>
    </div>

  </div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
  }
</script>

</body>
</html>
