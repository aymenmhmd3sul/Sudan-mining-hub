<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #111a2e;
  padding: 30px;
  border-radius: 14px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid #24324d;
  background: #0b1220;
  color: white;
}

button {
  width: 100%;
  margin-top: 18px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.logo {
  text-align: center;
  font-size: 28px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo">⛏️ Mining Hub</div>

    <form onsubmit="loginUser(event)">

      <input type="text" name="identifier" placeholder="Email or Phone" required>

      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">Login</button>

    </form>

  </div>
</div>

<script>
async function loginUser(event) {
  event.preventDefault();

  const email = document.querySelector("input[name='identifier']").value;
  const password = document.querySelector("input[name='password']").value;

  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.detail || "Login failed");
      return;
    }

    localStorage.setItem("token", data.access_token);
    localStorage.setItem("role", data.user.role);

    if (data.user.role === "admin") {
      window.location.href = "/admin";
    } else {
      window.location.href = "/dashboard";
    }

  } catch (err) {
    alert("Server error");
  }
}
</script>

</body>
</html>
