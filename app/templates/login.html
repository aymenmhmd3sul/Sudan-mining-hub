<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السودان للتعدين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    

    
    

    <style>
    html, body {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100dvh !important;
        overflow: hidden !important;
        touch-action: none !important;
    }
    *, *::before, *::after, body, div, h2, p, a, span {
        -webkit-touch-callout: none !important;
        -webkit-user-select: none !important;
        -khtml-user-select: none !important;
        -moz-user-select: none !important;
        -ms-user-select: none !important;
        user-select: none !important;
    }
    input {
        -webkit-user-select: text !important;
        user-select: text !important;
    }
    .password-container {
        position: relative !important;
        width: 100% !important;
    }
    /* الأيقونة النصية الناصعة المستقرة داخل الحقل */
    .custom-eye-toggle {
        position: absolute !important;
        left: 15px !important;
        top: 50% !important;
        transform: translateY(-50%) !important;
        color: #ffffff !important;
        font-size: 20px !important;
        cursor: pointer !important;
        z-index: 1000 !important;
        font-style: normal !important;
        line-height: 1 !important;
        opacity: 1 !important;
    }
    </style>
    
</head>
<body>
    <div class="top-bar">
        <button class="lang-btn" onclick="alert('جاري تبديل اللغة...')">EN</button>
        <h2 style="margin:0 0 5px 0;">⚖️ ⛏️ منصة السودان للتعدين</h2>
        <p style="margin:0; font-size:13px; color:#ddd;">بوابة إدارة قطاع التعدين الذكية</p>
    </div>
    <div class="gold-ticker">
        بورصة الذهب مباشر | الأونصة: $2,345 | عيار 24: $75.40
    </div>
    <div class="main-container">
        <div class="login-card">
            <h3>تسجيل الدخول الآمن</h3>
            <input type="email" autocomplete="off" id="email" placeholder="البريد الإلكتروني">
            <div class="pass-container">
                <div class="password-container"><input type="password" autocomplete="new-password" id="pass" placeholder="كلمة المرور"><i class="custom-eye-toggle" id="togglePasswordIcon">👁️</i></div>
                <i class="fa fa-eye toggle-pass" onclick="togglePass()"></i>
            </div>
            <button onclick="login()">دخول</button>
            <div id="msg" style="margin-top:10px; color:#ff4444; text-align:center; font-size:13px;"></div>
            <div class="links">
                <a href="#">تسجيل جديد</a>
                <a href="#">نسيت كلمة المرور؟</a>
            </div>
            <div class="visitor-link">
                <a href="#">دخول كزائر <i class="fa fa-arrow-left" style="font-size:11px;"></i></a>
            </div>
            <div class="social-bar">
                <i class="fab fa-whatsapp" style="color:#25D366;"></i>
                <i class="fab fa-facebook" style="color:#1877F2;"></i>
            </div>
        </div>
    </div>
    <script>
        function togglePass() {
            const p = document.getElementById("pass");
            p.type = p.type === "password" ? "text" : "password";
        }
        async function login() {
            const username = document.getElementById("email").value;
            const password = document.getElementById("pass").value;
            const body = new URLSearchParams({ username, password });
            const res = await fetch("/login", {
                method: "POST",
                headers: {"Content-Type": "application/x-www-form-urlencoded"},
                body: body
            });
            if(res.ok) {
                window.location.href = "/admin";
            } else {
                document.getElementById("msg").innerText = "خطأ في بيانات الدخول";
            }
        }
    
    window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('input').forEach(input => {
            input.value = '';
        });
    });
    

    window.addEventListener('pageshow', function (event) {
        const emailField = document.querySelector('input[type="email"]');
        const passwordField = document.querySelector('input[type="password"]');
        if (emailField) {
            emailField.value = '';
            emailField.setAttribute('autocomplete', 'off');
        }
        if (passwordField) {
            passwordField.value = '';
            passwordField.setAttribute('autocomplete', 'new-password');
        }
    });
    
</script>
</body>
</html>
