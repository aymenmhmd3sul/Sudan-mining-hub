<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السودان للتعدين - بوابة الإدارة</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: linear-gradient(145deg, #222, #111);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #333;
            position: relative;
        }
        .header-zone {
            background-color: #8B0000;
            margin: -30px -30px 20px -30px;
            padding: 30px;
            border-radius: 15px 15px 0 0;
            position: relative;
        }
        .lang-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .icons-row {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            margin: 5px 0;
        }
        .subtitle {
            font-size: 14px;
            color: #DAA520;
        }
        .ticker {
            background-color: #2b2b2b;
            color: #DAA520;
            font-size: 12px;
            padding: 8px;
            margin: 10px -30px 20px -30px;
            border-bottom: 2px solid #DAA520;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #ccc;
            margin-bottom: 8px;
        }
        .input-field {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #2b2b2b;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #856404;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #DAA520;
        }
        .links-row {
            margin-top: 20px;
            font-size: 14px;
            color: #b5b5b5;
        }
        .links-row a {
            color: #c82333;
            text-decoration: none;
            margin: 0 10px;
        }
        .footer-support {
            margin-top: 30px;
            font-size: 13px;
            color: #888;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
        .social-icons a {
            color: #fff;
            margin: 0 10px;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="header-zone">
        <button class="lang-btn">EN</button>
        <div class="icons-row">⚖️ ⛏️</div>
        <div class="title">منصة السودان للتعدين</div>
        <div class="subtitle">بوابة إدارة قطاع التعدين الذكية</div>
    </div>

    <div class="ticker">
        بورصة الذهب مباشر 🔴 | الأونصة: $2,345 | عيار 24: $75.40
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
            <label>البريد الإلكتروني الحسابي الآمن</label>
            <input type="email" id="email" class="input-field" value="aymenmhmd3sul@gmail.com" required>
        </div>

        <div class="input-group" style="position: relative;">
            <label>كلمة المرور</label>
            <input type="password" id="password" class="input-field" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-submit">تسجيل الدخول الآمن</button>
    </form>

    <div class="links-row">
        <a href="#">التسجيل لأول مرة</a> | <a href="#" style="color: #aaa;">دخول كزائر</a>
    </div>

    <div class="footer-support">
        <p>لا تستطيع الدخول؟ <a href="tel:+249123456789" style="color: #DAA520; text-decoration: none;">اتصل بالدعم الفني</a></p>
        <div class="social-icons">
            <a href="#">🌐 فيسبوك</a>
            <a href="#">💬 واتساب</a>
        </div>
        <p style="font-size: 11px; margin-top: 15px;">⚖️ الشروط القانونية وإخلاء المسؤولية</p>
    </div>
</div>

<script>
function handleLogin(e) {
    e.preventDefault();
    // تحويل تلقائي للوحة العمليات الملونة الحية بمجرد الضغط للتجربة المباشرة
    window.location.href = "/admin/dashboard-view";
}
</script>

</body>
</html>
