<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Sudan Mining Hub</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
        }
        .header {
            padding: 20px;
            background: #111827;
            text-align: center;
            font-size: 22px;
        }
        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .card {
            background: #1f2937;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .title {
            font-size: 18px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    🟡 Sudan Mining Hub - لوحة التحكم
</div>

<div class="container">
    <div class="card">
        <div class="title">الذهب</div>
        <div>Gold Market</div>
    </div>

    <div class="card">
        <div class="title">التجار</div>
        <div>Traders</div>
    </div>

    <div class="card">
        <div class="title">الطلبات</div>
        <div>Orders</div>
    </div>
</div>

</body>
</html>
