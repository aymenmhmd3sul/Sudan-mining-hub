<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudan Mining Hub</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b1220;
    color:white;
}

/* Top bar */
.header {
    display:flex;
    justify-content:space-between;
    padding:16px 20px;
    background:#111827;
}

/* Price hero */
.hero {
    text-align:center;
    padding:40px 20px;
}

.price {
    font-size:60px;
    color:#22c55e;
    font-weight:bold;
}

/* Grid */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    padding:20px;
}

.card {
    background:#1f2937;
    padding:18px;
    border-radius:12px;
    border:1px solid #2b3648;
}

/* status */
.status {
    color:#94a3b8;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
    <div>🟡 Sudan Mining Hub</div>
    <div id="status">LIVE</div>
</div>

<div class="hero">
    <div class="price" id="gold">Loading...</div>
    <div class="status">Live Gold Price (USD)</div>
</div>

<div class="grid">
    <div class="card">
        <h3>📦 Orders</h3>
        <p>Buy & Sell Requests</p>
    </div>

    <div class="card">
        <h3>👤 Traders</h3>
        <p>Network Status</p>
    </div>

    <div class="card">
        <h3>⛏️ Mining</h3>
        <p>Equipment Data</p>
    </div>

    <div class="card">
        <h3>📢 Ads</h3>
        <p>Market Promotions</p>
    </div>
</div>

<script>
async function loadPrice(){
    try {
        const res = await fetch("/api/v1/gold-price");
        const data = await res.json();
        document.getElementById("gold").innerText = data.gold_usd;
    } catch (e) {
        document.getElementById("gold").innerText = "Error";
    }
}

loadPrice();
setInterval(loadPrice, 5000);
</script>

</body>
</html>
