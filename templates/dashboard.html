<!DOCTYPE html>
<html>
<head>
    <title>Mining Dashboard</title>
    <style>
        body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
        .box { background:#1e293b; padding:20px; margin:10px 0; border-radius:10px; }
        .title { color:#94a3b8; }
        .value { font-size:24px; margin-top:10px; }
    </style>
</head>

<body>

    <h2>Sudan Mining Dashboard</h2>

    <div class="box">
        <div class="title">Gold Price</div>
        <div class="value">
            {% if gold %}
                {{ gold }}
            {% else %}
                N/A
            {% endif %}
        </div>
    </div>

    <div class="box">
        <div class="title">System Status</div>
        <div class="value">{{ status }}</div>
    </div>

</body>
</html>
