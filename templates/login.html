<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Sudan Mining Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-container { background: #1e293b; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area h1 { color: #fbbf24; font-size: 24px; font-weight: bold; }
        .logo-area p { color: #94a3b8; font-size: 14px; margin-top: 5px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-group label { display: block; color: #cbd5e1; margin-bottom: 8px; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #fff; font-size: 16px; outline: none; transition: border 0.3s; }
        .input-group input:focus { border-color: #fbbf24; }
        .input-group .toggle-pass { position: absolute; left: 12px; top: 42px; color: #94a3b8; cursor: pointer; user-select: none; }
        .btn-submit { width: 100%; padding: 14px; background: #fbbf24; color: #0f172a; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #f59e0b; }
        .footer-links { margin-top: 25px; display: flex; justify-content: space-between; font-size: 14px; color: #94a3b8; }
        .footer-links a { color: #fbbf24; text-decoration: none; }
        .footer-links a:hover { text-decoration: underline; }
        .contact-links { margin-top: 25px; text-align: center; border-top: 1px solid #334155; padding-top: 20px; }
        .contact-links span { color: #94a3b8; font-size: 14px; display: block; margin-bottom: 10px; }
        .contact-icons a { color: #94a3b8; margin: 0 8px; font-size: 20px; text-decoration: none; }
        .contact-icons a:hover { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <h1>🔐 منصة التعدين السودانية</h1>
            <p>Sudan Mining Hub</p>
        </div>

        <form action="/auth/login" method="post">
            <div class="input-group">
                <label>البريد الإلكتروني أو الهاتف</label>
                <input type="text" name="username" placeholder="admin@test.com" required>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <input type="password" name="password" id="passwordInput" placeholder="••••••••" required>
                <span class="toggle-pass" onclick="togglePassword()">👁️</span>
            </div>
            <button type="submit" class="btn-submit">دخول</button>
        </form>

        <div class="footer-links">
            <a href="#">نسيت كلمة المرور؟</a>
            <a href="#">ليس لديك حساب؟ سجل الآن</a>
        </div>

        <div class="contact-links">
            <span>تواصل معنا</span>
            <div class="contact-icons">
                <a href="#">📞</a>
                <a href="#">📧</a>
                <a href="#">💬</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            var x = document.getElementById("passwordInput");
            if (x.type === "password") {
                x.type = "text";
            } else {
                x.type = "password";
            }
        }
    </script>
</body>
</html>
