<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة السودان للتعدين</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        .top-bar { background: #8B0000; padding: 15px; text-align: center; border-bottom: 3px solid #DAA520; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .gold-ticker { background: #1e1e1e; padding: 10px; text-align: center; color: #DAA520; border-bottom: 1px solid #333; font-size: 14px; font-weight: bold; }
        .main-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 100%; max-width: 380px; border-top: 5px solid #8B0000; box-shadow: 0 8px 24px rgba(0,0,0,0.5); box-sizing: border-box; }
        h3 { text-align: center; margin-top: 0; color: #fff; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        .pass-container { position: relative; }
        .toggle-pass { position: absolute; left: 12px; top: 22px; cursor: pointer; color: #aaa; z-index: 10; }
        button { width: 100%; padding: 12px; background: #DAA520; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; color: #000; font-size: 15px; margin-top: 10px; }
        .links { display: flex; justify-content: space-between; margin-top: 15px; font-size: 13px; }
        .links a { color: #DAA520; text-decoration: none; }
        .visitor-link { text-align: center; margin-top: 15px; font-size: 14px; }
        .visitor-link a { color: #aaa; text-decoration: none; }
        .social-bar { text-align: center; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .social-bar i { font-size: 24px; margin: 0 12px; cursor: pointer; }
        /* تحسين تموضع الزر ليكون مستقلاً تماماً على الهواتف دون تداخل */
        .lang-container { width: 100%; display: flex; justify-content: flex-start; padding-bottom: 5px; }
        .lang-btn { background: none; border: 1px solid #DAA520; color: #DAA520; padding: 4px 12px; cursor: pointer; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="lang-container">
            <button class="lang-btn" onclick="alert('جاري تبديل اللغة...')">EN</button>
        </div>
        <h2 style="margin:0 0 5px 0;">⚖️ ⛏️ منصة السودان للتعدين</h2>
        <p style="margin:0; font-size:13px; color:#ddd;">بوابة إدارة قطاع التعدين الذكية</p>
    </div>
    <div class="gold-ticker">
        بورصة الذهب مباشر | الأونصة: $2,345 | عيار 24: $75.40
    </div>
    <div class="main-container">
        <div class="login-card">
            <h3>تسجيل الدخول الآمن</h3>
            <form action="/api/auth/login" method="POST">
                <input type="email" name="username" placeholder="البريد الإلكتروني" required>
                <div class="pass-container">
                    <input type="password" name="password" id="pass" placeholder="كلمة المرور" required>
                    <i class="fa fa-eye toggle-pass" onclick="togglePass()"></i>
                </div>
                <button type="submit">دخول</button>
            </form>
            <div id="msg" style="margin-top:10px; color:#ff4444; text-align:center; font-size:13px;"></div>
            <div class="links">
                <a href="#">تسجيل جديد</a>
                <a href="#">نسيت كلمة المرور؟</a>
            </div>
            <div class="visitor-link">
                <a href="#">دخول كزائر <i class="fa fa-arrow-left" style="font-size:11px;"></i></a>
            </div>
            <div class="social-bar">
                <i class="fab fa-whatsapp" style="color:#25D366;"></i>
                <i class="fab fa-facebook" style="color:#1877F2;"></i>
            </div>
        </div>
    </div>
    <script>
        function togglePass() {
            const p = document.getElementById("pass");
            p.type = p.type === "password" ? "text" : "password";
        }
        // عرض رسالة خطأ إذا رجع السيرفر بمعامل الخطأ
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.getElementById("msg").innerText = "البريد الإلكتروني أو كلمة المرور غير صحيحة";
        }
    </script>
</body>
</html>
